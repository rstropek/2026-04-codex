# Demo 10b — Same code-review bot as codex-review.yml, but using the
# official `openai/codex-action` with the `unprivileged-user` safety
# strategy. See README.md in this folder for the side-by-side security
# comparison with Demo 10.
#
# Why `unprivileged-user`:
#   - The action starts a local Responses-API proxy that holds the real key.
#   - Codex is configured (via ~/.codex/config.toml) to talk to that proxy
#     using a throwaway token — it never sees CODEX_API_KEY.
#   - Codex runs as a separate Linux user (`codexuser`), so it can't read
#     the runner user's process env or /proc/<proxy>/environ either.
#   - Net: the agent has neither the secret value nor the access required
#     to grab it from another process.

name: Codex Review (via codex-action, unprivileged)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    outputs:
      review: ${{ steps.codex.outputs.final-message }}
    steps:
      - name: Create unprivileged Codex user
        # A dedicated system user that Codex will run as. The `runner` and
        # `codexuser` accounts share a group so both can access the
        # workspace, but `codexuser` cannot read `runner`'s environment or
        # the proxy process memory.
        run: |
          sudo adduser --system --home /home/codexuser --shell /bin/bash --group codexuser
          sudo usermod -a -G codexuser runner
          sudo usermod -a -G runner codexuser

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.number && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
          fetch-depth: 0

      - name: Share workspace with codexuser
        # setgid on directories ensures new files inherit the shared group.
        run: |
          sudo chown -R runner:codexuser "$GITHUB_WORKSPACE"
          sudo chmod -R g+rwX "$GITHUB_WORKSPACE"
          sudo find "$GITHUB_WORKSPACE" -type d -exec chmod g+s {} +

      - name: Pre-fetch PR refs
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Determine diff range
        id: range
        # PR event → diff the actual PR range.
        # Anything else (workflow_dispatch, schedule) → review the last commit.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
            echo "head=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_API_KEY }}
          safety-strategy: unprivileged-user
          codex-user: codexuser
          sandbox: read-only
          output-file: review.md
          prompt: |
            You are a senior code reviewer. Review ONLY the changes in the
            following git range.

            Diff range:
              ${{ steps.range.outputs.base }}...${{ steps.range.outputs.head }}

            Inspect the diff with:
              git log --oneline ${{ steps.range.outputs.base }}...${{ steps.range.outputs.head }}
              git diff ${{ steps.range.outputs.base }}...${{ steps.range.outputs.head }}

            Produce a concise Markdown review with these sections:
            Summary, Risks / Blockers, Suggestions, Nits. Keep it under 400
            words. If the diff is empty, say so in one line.

      - name: Upload review as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-review
          path: review.md
          if-no-files-found: warn

  post-review:
    runs-on: ubuntu-latest
    needs: review
    if: github.event_name == 'pull_request' && needs.review.outputs.review != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post review as PR comment
        uses: actions/github-script@v9
        env:
          REVIEW_TEXT: ${{ needs.review.outputs.review }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### Codex Review\n\n${process.env.REVIEW_TEXT}`,
            });
